<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heavy Metal Heritage | Digital Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000;
            --text-white: #fff;
            --accent: #00ff41;
            --border: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg-black); color: var(--text-white); overflow: hidden; height: 100vh; width: 100vw; }

        /* COLLAGE */
        .bg-collage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; display: grid; grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr; filter: brightness(0.3);
        }
        .bg-item { background-size: cover; background-position: center; border: 1px solid #111; }

        /* VISTAS */
        .view {
            display: none; height: 100vh; width: 100vw; padding: 20px;
            flex-direction: column; justify-content: center; align-items: center;
            position: absolute; top: 0; left: 0;
            background: rgba(0,0,0,0.5);
        }
        .active { display: flex; z-index: 10; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UI ELEMENTS */
        .btn-primary {
            background: white; color: black; padding: 12px 30px;
            border-radius: 30px; border: none; font-weight: 900;
            cursor: pointer; transition: 0.2s; text-transform: uppercase; margin-top: 15px;
        }
        .btn-back {
            position: absolute; top: 20px; left: 20px;
            background: #111; color: white; border: 1px solid var(--border);
            padding: 8px 15px; border-radius: 4px; cursor: pointer; z-index: 100;
        }

        /* MENU GRID */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 220px); gap: 15px; }
        .menu-card {
            background: rgba(15, 15, 15, 0.9); padding: 30px; border-radius: 12px;
            cursor: pointer; border: 1px solid var(--border); text-align: center;
            transition: 0.3s; backdrop-filter: blur(5px);
        }
        .menu-card:hover { border-color: white; transform: scale(1.05); }

        /* GAME UI ORIGINAL */
        .game-container {
            position: relative; border: 4px solid #222; 
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1);
        }
        #scoreLabel {
            position: absolute; top: -40px; left: 0; width: 100%;
            display: flex; justify-content: space-between;
            font-family: monospace; font-size: 1.2rem; color: var(--accent);
        }

        /* REPRODUCTOR */
        .player-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 85px;
            background: rgba(5, 5, 5, 0.95); border-top: 1px solid var(--border);
            display: none; align-items: center; padding: 0 30px; z-index: 500;
        }
    </style>
</head>
<body>

    <div class="bg-collage">
        <div class="bg-item" style="background-image: url('dio.webp');"></div>
        <div class="bg-item" style="background-image: url('judas.webp');"></div>
        <div class="bg-item" style="background-image: url('maiden.webp');"></div>
        <div class="bg-item" style="background-image: url('sabbath.avif');"></div>
    </div>

    <audio id="mainAudio"></audio>

    <section id="welcome" class="view active">
        <h1 style="font-size: 5rem; font-weight: 900; letter-spacing: -3px;">METAL.</h1>
        <button class="btn-primary" onclick="nav('menu')">INGRESAR</button>
    </section>

    <section id="menu" class="view">
        <button class="btn-back" onclick="nav('welcome')">←</button>
        <div class="menu-grid">
            <div class="menu-card" onclick="nav('history')">HISTORIA</div>
            <div class="menu-card" onclick="nav('translator-view')">TRADUCTOR</div>
            <div class="menu-card" onclick="nav('game-view'); startGame();">STARFLIGHT</div>
            <div class="menu-card" onclick="nav('credits')">CRÉDITOS</div>
        </div>
    </section>

    <section id="game-view" class="view">
        <button class="btn-back" onclick="nav('menu'); gameActive=false;">← VOLVER</button>
        <div class="game-container">
            <div id="scoreLabel">
                <span>STARFLIGHT ARCADE</span>
                <span id="scoreText">SCORE: 0</span>
            </div>
            <canvas id="gameCanvas" width="400" height="500"></canvas>
        </div>
    </section>

    <section id="translator-view" class="view">
        <button class="btn-back" onclick="nav('menu')">←</button>
        <div style="background:#111; padding:30px; border:1px solid #333; width:400px;">
            <h3>TRADUCTOR</h3>
            <select id="langTarget" style="width:100%; margin:10px 0; background:#000; color:#fff; padding:10px;">
                <option value="en">Inglés</option><option value="de">Alemán</option><option value="pt">Portugués</option>
            </select>
            <input type="text" id="transInput" style="width:100%; background:#000; color:#fff; padding:10px;" placeholder="Español...">
            <button class="btn-primary" onclick="translateNow()" style="width:100%">TRADUCIR</button>
            <div id="transOutput" style="margin-top:15px; color:var(--accent); font-family:monospace;">...</div>
        </div>
    </section>

    <section id="credits" class="view">
        <button class="btn-back" onclick="nav('menu')">←</button>
        <h1>Juan Andres Tellez</h1>
        <p>Grado 10A</p>
    </section>

    <div class="player-bar" id="player">
        <div style="font-size: 1.5rem; margin-right: 15px;">🎸</div>
        <div><b id="songTitle">War Pigs</b><br><small id="songArtist" style="color:#888">Black Sabbath</small></div>
        <div style="margin-left:auto; display:flex; gap:20px; font-size:1.5rem; cursor:pointer;">
            <span onclick="prevSong()">⏮</span> <span id="playBtn" onclick="togglePlay()">⏸</span> <span onclick="nextSong()">⏭</span>
        </div>
    </div>

    <script>
        // --- LOGICA DE NAVEGACION Y AUDIO ---
        const audio = document.getElementById('mainAudio');
        const playlist = [
            { title: "The Trooper", artist: "Iron Maiden", file: "thetrooper.mp3" },
            { title: "Painkiller", artist: "Judas Priest", file: "painkiller.mp3" },
            { title: "Holy Diver", artist: "Dio", file: "holydiver.mp3" },
            { title: "War Pigs", artist: "Black Sabbath", file: "warpigs.mp3" }
        ];
        let currentSongIndex = 3;

        function loadSong(index) {
            const song = playlist[index];
            document.getElementById('songTitle').innerText = song.title;
            document.getElementById('songArtist').innerText = song.artist;
            audio.src = song.file;
            audio.play().catch(() => {});
            document.getElementById('playBtn').innerText = "⏸";
        }

        function togglePlay() { audio.paused ? (audio.play(), document.getElementById('playBtn').innerText = "⏸") : (audio.pause(), document.getElementById('playBtn').innerText = "▶"); }
        function nextSong() { currentSongIndex = (currentSongIndex + 1) % playlist.length; loadSong(currentSongIndex); }
        function prevSong() { currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length; loadSong(currentSongIndex); }

        function nav(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('player').style.display = (id === 'welcome') ? 'none' : 'flex';
            if (id !== 'welcome' && !audio.src) loadSong(currentSongIndex);
        }

        async function translateNow() {
            const t = document.getElementById('transInput').value;
            const l = document.getElementById('langTarget').value;
            if(!t) return;
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(t)}&langpair=es|${l}`);
            const data = await res.json();
            document.getElementById('transOutput').innerText = data.responseData.translatedText;
        }

        // --- LÓGICA DE JUEGO "ORIGINAL" ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameActive = false, score = 0, keys = {}, bullets = [], enemies = [], stars = [];

        // Generar estrellas de fondo
        for(let i=0; i<50; i++) stars.push({ x: Math.random()*400, y: Math.random()*500, s: Math.random()*2 });

        let player = { x: 185, y: 440, w: 30, h: 30 };

        window.onkeydown = e => { keys[e.code] = true; if(e.code === 'Space' && gameActive) shoot(); };
        window.onkeyup = e => keys[e.code] = false;

        function shoot() { bullets.push({ x: player.x + 13, y: player.y, s: 8 }); }

        function startGame() {
            gameActive = true; score = 0; enemies = []; bullets = [];
            document.getElementById('scoreText').innerText = "SCORE: 0";
            if(window.enemyInt) clearInterval(window.enemyInt);
            window.enemyInt = setInterval(() => { if(gameActive) enemies.push({ x: Math.random()*370, y: -30, s: 3 }); }, 900);
            gameLoop();
        }

        function gameLoop() {
            if(!gameActive) return;
            // Update
            if(keys['ArrowLeft'] && player.x > 0) player.x -= 7;
            if(keys['ArrowRight'] && player.x < 370) player.x += 7;
            
            bullets.forEach((b, i) => { b.y -= b.s; if(b.y < 0) bullets.splice(i, 1); });
            enemies.forEach((e, ei) => {
                e.y += e.s;
                bullets.forEach((b, bi) => {
                    if(b.x > e.x && b.x < e.x+30 && b.y > e.y && b.y < e.y+30) {
                        enemies.splice(ei, 1); bullets.splice(bi, 1);
                        score += 10; document.getElementById('scoreText').innerText = "SCORE: " + score;
                    }
                });
                if(e.y > 500) { gameActive = false; alert("Misión Fallida!"); nav('menu'); }
            });

            // Draw
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,400,500);
            
            // Fondo de estrellas
            ctx.fillStyle = "#555";
            stars.forEach(s => { s.y += s.s; if(s.y > 500) s.y = 0; ctx.fillRect(s.x, s.y, 2, 2); });

            // Nave con resplandor
            ctx.shadowBlur = 15; ctx.shadowColor = "#fff";
            ctx.fillStyle = "#fff"; ctx.fillRect(player.x, player.y, 30, 30);
            
            // Balas
            ctx.shadowColor = "red"; ctx.fillStyle = "red";
            bullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 12));
            
            // Enemigos (Cuadritos)
            ctx.shadowColor = "#00ff41"; ctx.fillStyle = "#00ff41";
            enemies.forEach(e => ctx.fillRect(e.x, e.y, 30, 30));
            
            ctx.shadowBlur = 0;
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
