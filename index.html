<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Metal Heritage | Mobile Ready</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --txt: #fff; --accent: #00ff41; --border: #333; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; touch-action: manipulation; }
        
        body { background: var(--bg); color: var(--txt); overflow: hidden; height: 100dvh; width: 100vw; }

        /* COLLAGE */
        .bg-collage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; display: grid; grid-template-columns: 1fr 1fr; filter: brightness(0.3);
        }
        .bg-item { background-size: cover; background-position: center; }

        /* VISTAS */
        .view {
            display: none; height: 100dvh; width: 100vw; padding: 20px;
            flex-direction: column; justify-content: center; align-items: center;
            position: absolute; top: 0; left: 0; background: rgba(0,0,0,0.5);
        }
        .active { display: flex; z-index: 10; }

        /* UI ADAPTATIVA */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 500px; }
        @media (max-width: 600px) { .menu-grid { grid-template-columns: 1fr; } .view { padding: 10px; } }

        .menu-card {
            background: rgba(20,20,20,0.9); padding: 25px; border-radius: 12px;
            border: 1px solid var(--border); text-align: center; cursor: pointer;
        }

        .btn-primary { background: #fff; color: #000; padding: 15px 30px; border-radius: 30px; border: none; font-weight: 900; margin-top: 20px; }

        /* CONTROLES MÓVILES DEL JUEGO */
        .mobile-controls {
            display: none; position: absolute; bottom: 100px; width: 100%;
            justify-content: space-between; padding: 0 30px; z-index: 100;
        }
        @media (max-width: 900px) { .mobile-controls { display: flex; } }
        .ctrl-btn-game {
            width: 70px; height: 70px; background: rgba(255,255,255,0.1);
            border: 2px solid #555; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 2rem; color: #fff;
        }

        /* REPRODUCTOR */
        .player-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 80px;
            background: #080808; border-top: 1px solid var(--border);
            display: none; align-items: center; padding: 0 20px; z-index: 500;
        }

        canvas { background: #000; border: 2px solid #222; max-width: 100%; height: auto; }
    </style>
</head>
<body>

    <div class="bg-collage">
        <div class="bg-item" style="background-image: url('dio.webp');"></div>
        <div class="bg-item" style="background-image: url('judas.webp');"></div>
        <div class="bg-item" style="background-image: url('maiden.webp');"></div>
        <div class="bg-item" style="background-image: url('sabbath.avif');"></div>
    </div>

    <audio id="mainAudio"></audio>

    <section id="welcome" class="view active">
        <h1 style="font-size: 4rem; font-weight: 900;">METAL.</h1>
        <button class="btn-primary" onclick="nav('menu')">INGRESAR</button>
    </section>

    <section id="menu" class="view">
        <div class="menu-grid">
            <div class="menu-card" onclick="nav('history')">HISTORIA</div>
            <div class="menu-card" onclick="nav('translator-view')">TRADUCTOR</div>
            <div class="menu-card" onclick="nav('game-view'); startGame();">STARFLIGHT</div>
            <div class="menu-card" onclick="nav('credits')">CRÉDITOS</div>
        </div>
    </section>

    <section id="game-view" class="view">
        <button onclick="nav('menu'); gameActive=false;" style="position:absolute; top:20px; left:20px; background:none; border:1px solid #555; color:#fff; padding:5px 15px;">←</button>
        <h3 id="scoreText">SCORE: 0</h3>
        <canvas id="gameCanvas" width="350" height="450"></canvas>
        
        <div class="mobile-controls">
            <div style="display:flex; gap:10px;">
                <div class="ctrl-btn-game" ontouchstart="keys['ArrowLeft']=true" ontouchend="keys['ArrowLeft']=false">←</div>
                <div class="ctrl-btn-game" ontouchstart="keys['ArrowRight']=true" ontouchend="keys['ArrowRight']=false">→</div>
            </div>
            <div class="ctrl-btn-game" style="background:rgba(255,0,0,0.2)" ontouchstart="shoot()">🔥</div>
        </div>
    </section>

    <section id="credits" class="view">
        <button onclick="nav('menu')" class="btn-primary">VOLVER</button>
        <h1 style="text-align:center">Juan Andres Tellez<br><small>10A</small></h1>
    </section>

    <div class="player-bar" id="player">
        <div style="font-size: 1.2rem;">🎸 <span id="songTitle">War Pigs</span></div>
        <div style="margin-left:auto; display:flex; gap:15px; font-size:1.5rem;">
            <span onclick="prevSong()">⏮</span>
            <span id="playBtn" onclick="togglePlay()">⏸</span>
            <span onclick="nextSong()">⏭</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameActive = false, score = 0, keys = {}, bullets = [], enemies = [];
        let player = { x: 160, y: 390, w: 30, h: 30 };

        function nav(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('player').style.display = (id === 'welcome') ? 'none' : 'flex';
        }

        // --- AUDIO ---
        const audio = document.getElementById('mainAudio');
        const playlist = [
            { title: "The Trooper", file: "thetrooper.mp3" },
            { title: "Painkiller", file: "painkiller.mp3" },
            { title: "Holy Diver", file: "holydiver.mp3" },
            { title: "War Pigs", file: "warpigs.mp3" }
        ];
        let currentSong = 3;

        function loadSong(i) {
            audio.src = playlist[i].file;
            document.getElementById('songTitle').innerText = playlist[i].title;
            audio.play().catch(() => {});
        }
        function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
        function nextSong() { currentSong = (currentSong + 1) % playlist.length; loadSong(currentSong); }
        function prevSong() { currentSong = (currentSong - 1 + playlist.length) % playlist.length; loadSong(currentSong); }

        // --- GAME ---
        window.onkeydown = e => { keys[e.code] = true; if(e.code === 'Space') shoot(); };
        window.onkeyup = e => keys[e.code] = false;

        function shoot() { if(gameActive) bullets.push({ x: player.x + 13, y: player.y, s: 8 }); }

        function startGame() {
            gameActive = true; score = 0; enemies = []; bullets = [];
            if(!audio.src) loadSong(currentSong);
            if(window.eInt) clearInterval(window.eInt);
            window.eInt = setInterval(() => { if(gameActive) enemies.push({x: Math.random()*320, y:-30, s:3}); }, 1000);
            gameLoop();
        }

        function gameLoop() {
            if(!gameActive) return;
            if(keys['ArrowLeft'] && player.x > 0) player.x -= 5;
            if(keys['ArrowRight'] && player.x < 320) player.x += 5;

            ctx.fillStyle = "#000"; ctx.fillRect(0,0,350,450);
            
            bullets.forEach((b, i) => { 
                b.y -= b.s; ctx.fillStyle = "red"; ctx.fillRect(b.x, b.y, 4, 10);
                if(b.y < 0) bullets.splice(i, 1);
            });

            enemies.forEach((e, i) => {
                e.y += e.s; ctx.fillStyle = "#00ff41"; ctx.fillRect(e.x, e.y, 30, 30);
                bullets.forEach((b, bi) => {
                    if(b.x > e.x && b.x < e.x+30 && b.y > e.y && b.y < e.y+30) {
                        enemies.splice(i, 1); bullets.splice(bi, 1); score += 10;
                        document.getElementById('scoreText').innerText = "SCORE: " + score;
                    }
                });
                if(e.y > 450) { gameActive = false; alert("GAME OVER"); nav('menu'); }
            });

            ctx.fillStyle = "#fff"; ctx.fillRect(player.x, player.y, 30, 30);
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
